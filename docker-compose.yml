services:
  db:
    image: mariadb:10.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: study_buddy
    volumes:
      - db_data:/var/lib/mysql
      - ./study_buddy.sql:/docker-entrypoint-initdb.d/study_buddy.sql:ro

  api:
    build:
      context: ./server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: study_buddy
      SESSION_SECRET: study-buddy-secret
      PORT: 3000
    depends_on:
      - db

  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    ports:
      - "8082:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - db

  web:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./study-buddy-html:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  db_data:
