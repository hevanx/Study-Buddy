<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile - Study Buddy</title>
  <link href="https://fonts.googleapis.com/css?family=Inter" rel="stylesheet">
  <link rel="stylesheet" href="styles/nav.css" />
  <link rel="stylesheet" href="styles/profile.css" />
</head>

<body class="sb">
  <header class="sb-header">
    <nav class="sb-topnav" aria-label="Primary">
      <a href="index.html" class="sb-logo">Study Buddy</a>
      <div class="sb-rank-wrap" aria-label="Rank">
        <a href="ranked.html">
          <img src="assets/RankLogo.png" alt="Rank badge" class="sb-rank-badge sb-rank-badge--unranked" />
        </a>
      </div>
      <div class="sb-nav-links">
        <a class="sb-nav-btn" href="leaderboard.html">Leader board</a>
        <a class="sb-nav-btn" href="friends.html">Friends</a>
        <a class="sb-nav-btn" href="#settings-panel">Settings</a>
      </div>
    </nav>
  </header>

  <main class="sb-main">
    <div class="profile-card">
      <div class="profile-avatar-wrap">
        <img src="assets/Duck.png" alt="Profile" class="profile-pic" id="profile-duck">
      </div>
      <span class="profile-name">User</span>
      <div class="profile-rank-wrap">
        <img src="assets/RankLogo.png" alt="Rank badge" class="profile-rank" id="profile-rank-badge">
        <span class="profile-rank-name" id="profile-rank-name">Unranked</span>
      </div>
    </div>
  </main>

  <section id="settings-panel" class="sb-settings" aria-label="Settings">
    <div class="sb-settings-header">
      <a href="#" class="sb-back" aria-label="Close settings">←</a>
      <h2 class="sb-settings-title">Settings</h2>
      <div></div>
    </div>
    <div class="sb-settings-content">
      <a class="sb-settings-item" href="profile.html">Profile</a>
      <a class="sb-settings-item" href="login.html">Log out</a>
    </div>
  </section>

  <script src="scripts/ProgressRepository.js"></script>
  <script src="scripts/xpSystem.js"></script>
  <script src="scripts/main.js"></script>
  <script>
    (async function () {
      var userId   = localStorage.getItem('sb-userId') || 'guest';
      var username = localStorage.getItem('sb-username');
      var nameEl   = document.querySelector('.profile-name');
      if (nameEl && username) nameEl.textContent = username;

      // ── Duck variant ─────────────────────────────────────────────
      // CosmeticStore and getDuckImage are globals from main.js
      var eq = await CosmeticStore.load();
      // Migrate: glasses previously stored in glassesId → move to hatId
      if (eq.glassesId && !eq.hatId) eq.hatId = eq.glassesId;
      eq.glassesId = null;
      var duckEl = document.getElementById('profile-duck');
      if (duckEl) duckEl.src = getDuckImage(eq);

      // ── Rank ─────────────────────────────────────────────────────
      // getRankInfo is a global from xpSystem.js; RANKS[n].img holds the badge path
      var progress    = await new ApiProgressRepository('/api').getProgress(userId);
      var rankInfo    = getRankInfo(progress.totalXp);

      var profileBadge = document.getElementById('profile-rank-badge');
      var profileName  = document.getElementById('profile-rank-name');
      var navBadgeImg  = document.querySelector('.sb-rank-badge');
      var navBadgeName = document.getElementById('rank-badge-name');
      if (profileBadge) profileBadge.src        = rankInfo.current.img;
      if (profileName)  profileName.textContent  = rankInfo.current.name;
      if (navBadgeImg) {
        navBadgeImg.src = rankInfo.current.img;
        navBadgeImg.classList.toggle('sb-rank-badge--unranked', rankInfo.current.name === 'Unranked');
      }
      if (navBadgeName) navBadgeName.textContent = rankInfo.current.name;
    })();
  </script>
</body>
</html>
